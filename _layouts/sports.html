<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | Ruslan Magana</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="sports-base" content="{{ '/' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/sports.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/sports-cards.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/sports-mobile.css' | relative_url }}">
    {% include sports/json-ld.html %}
  </head>
  <body class="sports-page">
    {% include sports/sports-nav.html %}
    <main class="sports-shell">
      {{ content }}
    </main>
    <script src="{{ '/assets/js/sports-app.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sports-pages.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sports-live.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sports-filters.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sports-countdown.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sports-share.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/sports-analytics.js' | relative_url }}" defer></script>
  </body>
</html>
