# GitHub Pages PROJECT site for the sports-trends repo.
# Published at https://ruslanmv.com/sports-trends/ (project page under the
# user site's custom domain). The baseurl makes every asset/link resolve under
# /sports-trends/ so nothing 404s. All deploys stay inside THIS repo.
title: "Ruslan Magana Sports Intelligence"
description: "AI predictions, live results, and trending games updated every 30 minutes."
url: "https://ruslanmv.com"
baseurl: "/sports-trends"
markdown: kramdown
permalink: pretty

sass:
  style: compressed

# Only the section's own files need to be processed; keep the Python project out.
exclude:
  - src/
  - tests/
  - scripts/
  - docs/
  - templates/
  - .venv/
  - venv/
  - node_modules/
  - vendor/
  - .data_lake/
  - .models/
  - .github/
  - requirements.txt
  - pyproject.toml
  - package.json
  - package-lock.json
  - README.md
  - LICENSE
  - Makefile
  - Gemfile
  - Gemfile.lock
  - .preview_sports.html

keep_files:
  - assets/data
