{% if page.jsonld %}
<script type="application/ld+json">{{ page.jsonld | jsonify }}</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ page.title | default: 'Ruslan Magana Sports Intelligence' }}",
  "url": "{{ page.url | absolute_url }}",
  "description": "{{ page.description | default: 'AI predictions, live results, and trending games updated every 30 minutes.' }}",
  "publisher": { "@type": "Person", "name": "Ruslan Magana Vsevolodovna" }
}
</script>
{% endif %}
