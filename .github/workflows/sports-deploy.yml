# Build the Jekyll site (with fresh JSON) and deploy it to GitHub Pages.
# Enable once in the repo: Settings -> Pages -> Source = "GitHub Actions".
# For the production URL, add a custom domain (e.g. sports.ruslanmv.com) in the
# same Pages settings; the root-absolute asset paths require serving at a domain
# root (a *.github.io/<repo>/ subpath would break them).
name: Sports Deploy (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "assets/**"
      - "_includes/sports/**"
      - "_layouts/sports*.html"
      - "sports/**"
      - "_config.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ruslanmv/sports-trends-dataset
      HF_MODEL_REPO: ruslanmv/sports-trends-models
      SPORTS_API_FOOTBALL_KEY: ${{ secrets.SPORTS_API_FOOTBALL_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Validate JSON + run tests (CI gate)
        run: |
          python -c "from sports_trends.datasets.validate_dataset import validate_frontend_json as v; import sys; r=v(); print(r); sys.exit(1 if r.get('schema_errors') else 0)"
          pytest -q
      - name: Refresh public JSON (mock fallback if no keys)
        run: |
          python scripts/run_publish_frontend_json.py
          python scripts/run_worldcup_pipeline.py || true
      - name: Build site with Jekyll
        run: bundle exec jekyll build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
