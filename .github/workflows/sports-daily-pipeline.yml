# Daily master pipeline: refresh the Hugging Face dataset, retrain the
# sport-optimized models, regenerate tomorrow's predictions, and update the
# dynamic README — so there is ALWAYS a freshly trained model and an up-to-date
# Top-5 every day. Runs with mock-data fallback when secrets are absent; HF
# uploads use dry-run unless HF_TOKEN is set.
name: Sports Daily Pipeline

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without uploading to Hugging Face / committing"
        type: boolean
        default: false
  schedule:
    # 03:20 UTC daily — after fixtures for "tomorrow" are published by providers.
    - cron: "20 3 * * *"

permissions:
  contents: write

concurrency:
  group: sports-daily
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ruslanmv/sports-trends-dataset
      # Real keyless feed (TheSportsDB) in production; mock is only a safety net.
      SPORTS_ENABLE_LIVE_FEED: "1"
      HF_MODEL_REPO: ruslanmv/sports-trends-models
      SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
      SPORTS_API_FOOTBALL_KEY: ${{ secrets.SPORTS_API_FOOTBALL_KEY }}
      SPORTS_BASKETBALL_API_KEY: ${{ secrets.SPORTS_BASKETBALL_API_KEY }}
      SPORTS_TENNIS_API_KEY: ${{ secrets.SPORTS_TENNIS_API_KEY }}
      SPORTS_CRICKET_API_KEY: ${{ secrets.SPORTS_CRICKET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: 1) Refresh Hugging Face dataset (raw + manifest)
        run: python scripts/run_upload_to_hf_dataset.py

      - name: 1b) Reconcile open predictions vs real results (feedback loop)
        run: python scripts/run_reconcile_outcomes.py

      - name: 2) Generate leakage-safe features
        run: python scripts/run_generate_features.py

      - name: 3) Rebuild training datasets (+ leakage report)
        run: python scripts/run_build_training_dataset.py

      - name: 4) Train + publish sport-optimized models (daily)
        run: python scripts/run_train_models.py

      - name: 5) Build tomorrow's inference window
        run: python scripts/run_generate_inference_window.py

      - name: 6) Predict tomorrow + publish public JSON
        run: python scripts/run_predict_tomorrow.py

      - name: 6a) Log predictions to the ledger (feedback loop step 1)
        run: python scripts/run_log_predictions.py

      - name: 6b) World Cup — fetch, predict, publish (free OpenFootball + mock fallback)
        run: python scripts/run_worldcup_pipeline.py

      - name: 7) Regenerate SEO match/league pages + OG cards
        run: |
          python scripts/run_generate_pages.py
          python scripts/run_generate_og_images.py

      - name: 8) Refresh the dynamic README (Top-5 + model registry)
        run: python scripts/update_readme.py

      - name: Commit refreshed site data, models summary, README, SEO pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/data/sports sports/match sports/league \
                  sports/sitemap-sports.xml assets/images/sports/og || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(sports): daily dataset + model retrain + predictions [skip ci]"
            git push
          fi
