name: Sports Tomorrow Predictions

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run task
        run: python scripts/run_tomorrow_predictions.py
      - name: Validate JSON
        run: python scripts/validate_json.py
      - name: Commit generated updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(sports): update generated sports data"
