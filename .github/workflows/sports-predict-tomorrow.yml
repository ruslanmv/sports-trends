# Auto-managed workflow for sports-trends. Runs with mock-data fallback when
# secrets are absent; HF uploads use dry-run unless HF_TOKEN is set.
name: Sports Predict Tomorrow

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"


jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_DATASET_REPO: ruslanmv/sports-trends-dataset
      # Real keyless feed (TheSportsDB) in production; mock is only a safety net.
      SPORTS_ENABLE_LIVE_FEED: "1"
      HF_MODEL_REPO: ruslanmv/sports-trends-models
      SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
      SPORTS_API_FOOTBALL_KEY: ${{ secrets.SPORTS_API_FOOTBALL_KEY }}
      SPORTS_BASKETBALL_API_KEY: ${{ secrets.SPORTS_BASKETBALL_API_KEY }}
      SPORTS_TENNIS_API_KEY: ${{ secrets.SPORTS_TENNIS_API_KEY }}
      SPORTS_CRICKET_API_KEY: ${{ secrets.SPORTS_CRICKET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run
        run: |
          python scripts/run_predict_tomorrow.py
          # Feedback loop step 1: log each prediction (feature snapshot + model
          # version + probabilities) to the prediction ledger for later scoring.
          python scripts/run_log_predictions.py
      - name: Commit changed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/sports || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(sports): daily tomorrow predictions [skip ci]"
            git push
          fi
